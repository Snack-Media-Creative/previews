<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports News Ticker - Scalable</title>
<style>
  :root {
    --ticker-height: 100px; 

    --font-size: calc(var(--ticker-height) * 0.40);
    --ball-size: calc(var(--ticker-height) * 0.46); 
    --logo-height: calc(var(--ticker-height) * 0.55);
  }

  body {
    margin: 0;
    padding: 0;
    background-color: #f0f0f0;
    font-family: 'Arial', sans-serif;
  }

  /* Main Ticker Container */
  .ticker-wrapper {
    width: 100%;
    height: var(--ticker-height);
    min-height: var(--ticker-height);
    max-height: var(--ticker-height);
    box-sizing: border-box;
    background-color: #ffffff;
    display: flex;
    position: fixed;
    bottom: 0;
    left: 0;
    box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.1);
    z-index: 1000;
  }

  /* Shared styling for both logo areas */
  .logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    width: calc(var(--ticker-height) * 1.33); /* Keeps logos proportional to height */
    height: var(--ticker-height);
    background-color: #ffffff;
    z-index: 10;
    flex-shrink: 0;
    position: relative;
  }

  .logo-left { box-shadow: 10px 0 20px rgba(0, 0, 0, 0.1); }
  .logo-right { box-shadow: -10px 0 20px rgba(0, 0, 0, 0.1); }

  .logo-container img {
    height: var(--logo-height);
    max-width: 80%;
    object-fit: contain;
  }

  /* The middle area where the animation happens */
  .scrolling-container {
    flex-grow: 1;
    height: var(--ticker-height);
    position: relative;
    display: flex;
    align-items: center;
    overflow: hidden;
    z-index: 1;
  }

  /* The wrapper for the moving text and baseball */
  .ticker-content {
    display: flex;
    align-items: center;
    width: max-content;
    animation: scroll-left 15s linear infinite;
    will-change: transform;
  }

  .ticker-group {
    display: flex;
    align-items: center;
    white-space: nowrap;
  }

  .ticker-phrase {
    display: flex;
    align-items: center;
    margin-right: 100px;
  }

  /* The flying/spinning baseball */
  .baseball {
    font-size: var(--ball-size);
    line-height: 1;
    margin-right: 20px;
    display: inline-block;
    animation: spin 1.5s linear infinite;
  }

  /* Ticker Text Styling */
  .ticker-text {
    color: #000000;
    font-size: var(--font-size);
    line-height: 1;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 0;
  }

  @keyframes scroll-left {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  @keyframes spin {
    100% { transform: rotate(-360deg); }
  }
</style>
</head>
<body>

  <div class="ticker-wrapper">
    
    <div class="logo-container logo-left">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/BBC_Logo_2021.svg" alt="BBC Logo">
    </div>

    <div class="scrolling-container">
      <div class="ticker-content">
        
        <!-- Group 1 -->
        <div class="ticker-group">
          <div class="ticker-phrase">
            <span class="baseball">⚾</span>
            <span class="ticker-text">Tune in this Sunday</span>
          </div>
          <div class="ticker-phrase">
            <span class="baseball">⚾</span>
            <span class="ticker-text">Tune in this Sunday</span>
          </div>
          <div class="ticker-phrase">
            <span class="baseball">⚾</span>
            <span class="ticker-text">Tune in this Sunday</span>
          </div>
        </div>

        <!-- Group 2 -->
        <div class="ticker-group">
          <div class="ticker-phrase">
            <span class="baseball">⚾</span>
            <span class="ticker-text">Tune in this Sunday</span>
          </div>
          <div class="ticker-phrase">
            <span class="baseball">⚾</span>
            <span class="ticker-text">Tune in this Sunday</span>
          </div>
          <div class="ticker-phrase">
            <span class="baseball">⚾</span>
            <span class="ticker-text">Tune in this Sunday</span>
          </div>
        </div>

      </div>
    </div>

    <div class="logo-container logo-right">
      <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Major_League_Baseball_logo.svg" alt="MLB Logo">
    </div>

  </div>

</body>
</html>
