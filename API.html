<!DOCTYPE html>

            background-color: #f4f7f6;
            margin: 0;
            padding: 20px; /* Slightly reduced base padding */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        #table-container {
            width: 100%;
            max-width: 1200px;
            
            /* Responsive scrolling properties */
            overflow-x: auto;
            overflow-y: auto;
            max-height: 80vh; /* Allows vertical scroll on smaller viewports */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling for iOS */
            
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        table {
            width: 100%;
            /* Changed to 'separate' so sticky headers render cleanly */
            border-collapse: separate; 
            border-spacing: 0;
            text-align: center;
            white-space: nowrap;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #eeeeee;
        }
        th {
            background-color: #0056b3;
            color: white;
            font-weight: 600;
            /* Sticky Header */
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        /* Align Team names and Notes to the left */
        td:nth-child(2), th:nth-child(2), 
        td:last-child, th:last-child {
            text-align: left;
        }
        
        /* Apply hover effect to td instead of tr to prevent sticky header bleeding */
        tr:hover td {
            background-color: #f8f9fa;
        }

        /* --- RESPONSIVE MEDIA QUERIES --- */
        
        /* Tablet screens */
        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
            }
            th, td {
                padding: 10px 12px;
                font-size: 14px;
            }
        }

        /* Mobile screens */
        @media (max-width: 576px) {
            th, td {
                padding: 8px 10px;
                font-size: 13px;
            }
            /* Hide the lengthy Notes column on tiny screens to improve focus on stats */
            th:last-child, td:last-child {
                display: none;
            }
        }
    </style>
</head>
